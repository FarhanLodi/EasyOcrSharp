name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore EasyOcrSharp.sln

      - name: Build (Release)
        run: dotnet build EasyOcrSharp.sln -c Release --no-restore

      - name: Test (unit only — integration tests need model downloads)
        run: dotnet test test/EasyOcrSharp.Tests/EasyOcrSharp.Tests.csproj -c Release --no-build --filter "Category!=Integration" --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: '**/test-results.trx'
          if-no-files-found: ignore

  pack:
    name: Pack (validate nupkg builds)
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Pack library
        run: dotnet pack src/EasyOcrSharp/EasyOcrSharp.csproj -c Release -o ./artifacts
      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: ./artifacts/*.nupkg
